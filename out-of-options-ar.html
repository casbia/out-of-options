<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<link rel="icon" href="data:,">
<title>不在選項裡 · Out of Options</title>

<!--
  替換清單：
  1. targets.mind → https://hiukim.github.io/mind-ar-js-doc/tools/compile
  2. reveal.jpg   → 從箱內拍攝的真實照片，同資料夾
  3. MARKER_WIDTH_M → 你實際印出的 marker 寬度（公尺），預設 0.12
  4. DEV_MODE: false → 展場正式使用前改掉
-->

<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.152.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.152.0/examples/jsm/",
    "mindar-image-three": "https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-three.prod.js"
  }
}
</script>
<script type="module">
  import * as THREE from 'three';
  import { MindARThree } from 'mindar-image-three';

  /* THREE r152 removed outputEncoding. MindAR still sets it internally.
     Override the prototype setter unconditionally so the call is a no-op
     and no console warning ever fires. */
  Object.defineProperty(THREE.WebGLRenderer.prototype, 'outputEncoding', {
    set()  { /* silently ignored */ },
    get()  { return 3001; },
    configurable: true,
    enumerable:   false,
  });

  window.THREE = THREE;
  window.MindARThree = MindARThree;
  window._mindARReady = true;
  window.dispatchEvent(new Event('mindar-ready'));
</script>

<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
:root {
  --bg:        #F2F4F7;
  --surface:   #FFFFFF;
  --surface2:  #F7F8FA;
  --border:    #E8EAED;
  --text-pri:  #1C1E21;
  --text-sec:  #65676B;
  --text-ter:  #90949C;
  --accent:    #FF5C5C;
  --accent-lt: #FFF0F0;
  --blue:      #1877F2;
  --green:     #31A24C;
  --r-sm:10px; --r-md:16px; --r-lg:22px; --r-pill:999px;
  --sh-sm: 0 1px 4px rgba(0,0,0,0.10);
  --sh-md: 0 4px 16px rgba(0,0,0,0.12);
  --sh-lg: 0 12px 40px rgba(0,0,0,0.20);
}

* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
html, body {
  width:100%; height:100%;
  font-family:'Noto Sans TC',-apple-system,BlinkMacSystemFont,sans-serif;
  background:#000; color:var(--text-pri);
  overflow:hidden; position:fixed;
}

/* ══════════════════════════════
   SCREENS
══════════════════════════════ */
.screen {
  position:fixed; inset:0; z-index:20;
  display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  opacity:0; pointer-events:none;
  transition:opacity 0.45s ease;
  background:var(--bg);
}
.screen.active { opacity:1; pointer-events:all; }

/* ══════════════════════════════
   ENTRY
══════════════════════════════ */
#screen-entry { justify-content:flex-start; }
.entry-scroll {
  width:100%; max-width:460px; height:100%;
  overflow-y:auto; padding:32px 20px 48px;
  display:flex; flex-direction:column; gap:14px;
  scrollbar-width:none;
}
.entry-scroll::-webkit-scrollbar { display:none; }

.notif-bar { display:flex; align-items:center; gap:8px; padding-bottom:4px; }
.notif-dot { width:8px;height:8px;border-radius:50%;background:var(--accent);box-shadow:0 0 0 3px var(--accent-lt); }
.notif-text { font-size:12px; color:var(--text-sec); }
.notif-time { margin-left:auto; font-size:11px; color:var(--text-ter); }

.delivery-card {
  background:var(--surface); border-radius:var(--r-lg);
  box-shadow:var(--sh-md); padding:20px;
  display:flex; flex-direction:column; gap:14px;
}
.dc-top { display:flex; align-items:center; gap:14px; }
.dc-icon { width:52px;height:52px;border-radius:var(--r-md);background:var(--accent-lt);display:flex;align-items:center;justify-content:center;font-size:28px;flex-shrink:0; }
.dc-title { font-size:16px; font-weight:600; margin-bottom:3px; }
.dc-sub   { font-size:13px; color:var(--text-sec); line-height:1.5; }
.dc-status { display:flex;align-items:center;gap:8px;padding:10px 14px;background:#FFF8E7;border-radius:var(--r-sm);border-left:3px solid #FFB300; }
.dc-sdot { width:8px;height:8px;border-radius:50%;background:#FFB300;flex-shrink:0;animation:blink 1.5s ease-in-out infinite; }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.25} }
.dc-status span { font-size:13px; font-weight:500; color:#8A6000; }
.dc-addr { font-size:12px; color:var(--text-ter); display:flex; align-items:center; gap:6px; }

.msg-card {
  background:var(--surface); border-radius:var(--r-lg);
  box-shadow:var(--sh-sm); padding:16px 18px;
  display:flex; align-items:center; gap:14px;
  cursor:pointer; transition:transform 0.15s;
}
.msg-card:active { transform:scale(0.97); }
.mc-avt { width:46px;height:46px;border-radius:50%;background:linear-gradient(135deg,#2d6a6a,#1a4a5a);display:flex;align-items:center;justify-content:center;font-size:24px;flex-shrink:0;position:relative; }
.mc-badge { position:absolute;top:-2px;right:-2px;width:16px;height:16px;border-radius:50%;background:var(--accent);border:2px solid var(--surface);display:flex;align-items:center;justify-content:center;font-size:8px;color:#fff;font-weight:700; }
.mc-body { flex:1; min-width:0; }
.mc-name { font-size:15px; font-weight:600; margin-bottom:3px; }
.mc-prev { font-size:13px;color:var(--text-sec);white-space:nowrap;overflow:hidden;text-overflow:ellipsis; }
.mc-time { font-size:11px; color:var(--accent); font-weight:500; flex-shrink:0; }

.open-btn {
  width:100%; padding:16px;
  background:var(--accent); color:#fff;
  font-size:16px; font-weight:600;
  border:none; border-radius:var(--r-pill); cursor:pointer;
  box-shadow:0 4px 16px rgba(255,92,92,0.4);
  transition:all 0.2s; letter-spacing:0.03em;
}
.open-btn:active { transform:scale(0.97); box-shadow:none; }
.entry-hint { font-size:11px; color:var(--text-ter); text-align:center; line-height:1.8; }

/* ══════════════════════════════
   LOADING
══════════════════════════════ */
#screen-loading { gap:16px; }
.spin { width:44px;height:44px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin 1s linear infinite; }
@keyframes spin { to{transform:rotate(360deg)} }
.spin-label { font-size:13px; color:var(--text-sec); }

/* ══════════════════════════════
   PRE-SCAN: chat before AR
══════════════════════════════ */
#chat-pre {
  position:fixed; inset:0; z-index:20;
  display:flex; flex-direction:column;
  background:var(--bg);
  opacity:0; pointer-events:none; transition:opacity 0.45s;
}
#chat-pre.active { opacity:1; pointer-events:all; }

/* ══════════════════════════════
   AR LAYER (camera, always behind)
══════════════════════════════ */
#ar-container {
  position:fixed; inset:0; z-index:1;
  display:none;
}
#ar-container.active { display:block; }

/* ══════════════════════════════
   AR EXPERIENCE OVERLAY
   (transparent over camera)
══════════════════════════════ */
#ar-ux {
  position:fixed; inset:0; z-index:10;
  display:flex; flex-direction:column;
  pointer-events:none;
  opacity:0; transition:opacity 0.45s;
}
#ar-ux.active { opacity:1; pointer-events:all; }

/* Top: scan frame + messages */
.ar-top {
  flex:1; position:relative;
  display:flex; flex-direction:column;
  align-items:center; justify-content:flex-start;
  padding-top:52px; gap:12px;
  pointer-events:none;
}

/* Scan viewfinder (shown before target found) */
.scan-vf { width:180px; height:180px; position:relative; }
.vc { position:absolute; width:24px; height:24px; }
.vc.tl{top:0;left:0;border-top:3px solid var(--accent);border-left:3px solid var(--accent);border-radius:3px 0 0 0;}
.vc.tr{top:0;right:0;border-top:3px solid var(--accent);border-right:3px solid var(--accent);border-radius:0 3px 0 0;}
.vc.bl{bottom:0;left:0;border-bottom:3px solid var(--accent);border-left:3px solid var(--accent);border-radius:0 0 0 3px;}
.vc.br{bottom:0;right:0;border-bottom:3px solid var(--accent);border-right:3px solid var(--accent);border-radius:0 0 3px 0;}
.vsweep { position:absolute;left:3px;right:3px;height:2px;background:linear-gradient(90deg,transparent,var(--accent),transparent);border-radius:999px;animation:sweep 2.4s ease-in-out infinite;opacity:0.85; }
@keyframes sweep { 0%{top:3px;opacity:0}8%{opacity:0.85}92%{opacity:0.85}100%{top:175px;opacity:0} }
.scan-label { font-size:13px;font-weight:500;color:rgba(255,255,255,0.85);background:rgba(0,0,0,0.38);padding:6px 16px;border-radius:var(--r-pill);backdrop-filter:blur(4px);text-align:center; }

/* Target-found: incoming messages float over camera */
.ar-msg-stream {
  position:absolute; top:52px; left:0; right:0;
  display:flex; flex-direction:column; align-items:flex-start;
  gap:8px; padding:0 16px;
  pointer-events:none;
}
/* Avatar + bubble row */
.ar-bubble-row {
  display:flex; align-items:flex-end; gap:8px;
  max-width:88%;
  opacity:0; transform:translateY(6px);
  transition:all 0.35s ease;
}
.ar-bubble-row.in { opacity:1; transform:none; }
.ar-avt {
  width:28px; height:28px; border-radius:50%;
  background:linear-gradient(135deg,#2d6a6a,#1a4a5a);
  display:flex; align-items:center; justify-content:center;
  font-size:14px; flex-shrink:0;
}
.ar-bubble {
  padding:10px 14px;
  font-size:14px; line-height:1.5;
  background:rgba(255,255,255,0.93); color:var(--text-pri);
  border-radius:16px 16px 16px 4px;
  box-shadow:var(--sh-sm); backdrop-filter:blur(10px);
}

.ar-typing-dot {
  display:inline-block; width:6px; height:6px; border-radius:50%;
  background:var(--text-ter); margin:0 2px;
  animation:td 1.2s infinite;
}
.ar-typing-dot:nth-child(2){animation-delay:0.2s}
.ar-typing-dot:nth-child(3){animation-delay:0.4s}

/* Distance pill */
.dist-pill {
  position:absolute; top:16px; right:16px;
  background:rgba(0,0,0,0.45); backdrop-filter:blur(8px);
  border-radius:var(--r-pill); padding:5px 12px;
  display:flex; align-items:center; gap:6px;
  pointer-events:none; opacity:0; transition:opacity 0.4s;
}
.dist-pill.visible { opacity:1; }
.dp-dot { width:6px;height:6px;border-radius:50%;background:var(--accent);box-shadow:0 0 6px rgba(255,92,92,0.8);transition:box-shadow 0.4s; }
.dp-val { font-size:12px;font-weight:600;color:#fff;font-family:monospace;min-width:40px; }

/* Shared options dock — used in pre-chat AND AR overlay */
.options-dock {
  flex-shrink:0; background:var(--surface);
  border-top:1px solid var(--border); padding:12px 16px 32px;
}
.od-label {
  font-size:11px; font-weight:600; color:var(--text-ter);
  letter-spacing:0.08em; margin-bottom:10px; text-transform:uppercase;
}

/* ══════════════════════════════
   BOTTOM DOCK (fruit options)
   Lives inside #ar-ux so it's
   always above the camera feed
══════════════════════════════ */
.ar-bottom {
  flex-shrink:0;
  background:rgba(255,255,255,0.93);
  backdrop-filter:blur(20px);
  border-top:1px solid rgba(255,255,255,0.5);
  border-radius:var(--r-lg) var(--r-lg) 0 0;
  padding:14px 16px 36px;
  box-shadow:0 -4px 20px rgba(0,0,0,0.14);
}
.dock-label {
  font-size:10px; font-weight:600; color:var(--text-ter);
  letter-spacing:0.12em; margin-bottom:10px;
  text-transform:uppercase;
}
.fruit-grid {
  display:grid; grid-template-columns:repeat(3,1fr); gap:7px;
}
.f-btn {
  display:flex; flex-direction:column; align-items:center;
  justify-content:center; gap:4px; padding:11px 6px;
  background:var(--surface2); border:1.5px solid var(--border);
  border-radius:var(--r-md); cursor:pointer; transition:all 0.2s;
  position:relative;
}
.f-btn:active { transform:scale(0.93); }
.f-btn.selected { background:var(--accent-lt); border-color:var(--accent); }

/* Decay states — smooth CSS transitions on each button */
.f-btn { transition: opacity 0.6s ease, transform 0.6s ease, filter 0.6s ease; }
.f-btn.decay-1 { opacity:0.7;  transform:scale(0.96) rotate(-1deg);              filter:blur(0.4px); }
.f-btn.decay-2 { opacity:0.45; transform:scale(0.90) rotate(3deg)  skewX(-4deg); filter:blur(1.2px) saturate(0.6); }
.f-btn.decay-3 { opacity:0.2;  transform:scale(0.75) rotate(-6deg) skewX(7deg);  filter:blur(3px)   saturate(0.2); pointer-events:none; }
.f-btn.decay-gone {
  opacity:0; transform:scale(0.05) rotate(25deg);
  filter:blur(12px); pointer-events:none; cursor:default;
}

.f-emoji { font-size:22px; line-height:1; pointer-events:none; }
.f-label { font-size:10px; font-weight:500; color:var(--text-sec); pointer-events:none; }
.f-btn.selected .f-label { color:var(--accent); }
.f-btn.decay-3 .f-label, .f-btn.decay-4 .f-label { color:var(--text-ter); }

/* ══════════════════════════════
   POST-AR CHAT (reveal)
══════════════════════════════ */
#chat-reveal {
  position:fixed; inset:0; z-index:20;
  display:flex; flex-direction:column;
  background:var(--bg);
  opacity:0; pointer-events:none; transition:opacity 0.45s;
}
#chat-reveal.active { opacity:1; pointer-events:all; }

/* Shared chat chrome */
.chat-hdr {
  flex-shrink:0; padding:12px 16px 10px;
  background:var(--surface); border-bottom:1px solid var(--border);
  display:flex; align-items:center; gap:12px;
  box-shadow:var(--sh-sm);
}
.ch-back { font-size:22px; color:var(--blue); cursor:pointer; padding:4px; line-height:1; }
.ch-avt { width:38px;height:38px;border-radius:50%;background:linear-gradient(135deg,#2d6a6a,#1a4a5a);display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;position:relative; }
.ch-online { position:absolute;bottom:0;right:0;width:10px;height:10px;border-radius:50%;background:var(--green);border:2px solid var(--surface); }
.ch-name   { font-size:16px; font-weight:600; }
.ch-status { font-size:12px; color:var(--green); }

.chat-feed {
  flex:1; overflow-y:auto; padding:12px 16px 8px;
  display:flex; flex-direction:column; gap:4px;
  scrollbar-width:none;
}
.chat-feed::-webkit-scrollbar { display:none; }
.date-div { text-align:center; margin:8px 0; }
.date-div span { font-size:11px;color:var(--text-ter);background:var(--border);padding:3px 10px;border-radius:999px; }

.msg { display:flex;gap:8px;max-width:100%;opacity:0;transform:translateY(8px);transition:all 0.35s ease; }
.msg.in { opacity:1; transform:none; }
.msg-sys { align-self:flex-start; align-items:flex-end; margin-bottom:4px; }
.msg-usr { align-self:flex-end; flex-direction:row-reverse; margin-bottom:4px; }
.m-avt { width:28px;height:28px;border-radius:50%;background:linear-gradient(135deg,#2d6a6a,#1a4a5a);display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0; }
.bubble { padding:10px 14px;font-size:15px;line-height:1.5;max-width:76%;word-break:break-word; }
.msg-sys .bubble { background:var(--surface);color:var(--text-pri);border-radius:18px 18px 18px 4px;box-shadow:var(--sh-sm); }
.msg-usr .bubble { background:var(--blue);color:#fff;border-radius:18px 18px 4px 18px; }
.b-meta { font-size:10px;color:var(--text-ter);margin-top:3px;padding:0 4px; }
.msg-usr .b-meta { text-align:right; }

/* Photo message — sits in its own row with avatar */
.photo-row {
  display:flex; align-items:flex-end; gap:8px;
  align-self:flex-start; margin-bottom:4px;
  max-width:85%;
  opacity:0; transform:translateY(8px); transition:all 0.4s ease;
}
.photo-row.in { opacity:1; transform:none; }
.photo-bubble {
  flex:1; min-width:0;
  background:var(--surface); border-radius:16px;
  overflow:hidden; box-shadow:var(--sh-md);
}
.photo-bubble img {
  width:100%; display:block; height:auto; min-height:40px;
}
.photo-bubble .photo-cap {
  padding:8px 12px; font-size:12px;
  color:var(--text-sec); border-top:1px solid var(--border);
  font-style:italic;
}

.typing-row { display:flex;gap:8px;align-items:flex-end;align-self:flex-start;margin-bottom:4px;opacity:0;transition:opacity 0.3s; }
.typing-row.in { opacity:1; }
.typing-bub { background:var(--surface);border-radius:18px 18px 18px 4px;padding:12px 16px;box-shadow:var(--sh-sm);display:flex;gap:5px;align-items:center; }
.typing-bub span { width:6px;height:6px;border-radius:50%;background:var(--text-ter);animation:td 1.2s infinite; }
.typing-bub span:nth-child(2){animation-delay:0.2s}
.typing-bub span:nth-child(3){animation-delay:0.4s}
@keyframes td { 0%,60%,100%{opacity:0.3;transform:none}30%{opacity:1;transform:translateY(-3px)} }

/* ══════════════════════════════
   DEV SLIDER
══════════════════════════════ */
#dev-wrap {
  position:fixed; bottom:0; left:0; right:0; z-index:99;
  background:rgba(255,255,255,0.97); padding:10px 20px 32px;
  border-top:1px solid var(--border); display:none;
}
#dev-wrap.show { display:block; }
.dev-lbl { font-size:11px;color:var(--text-ter);text-align:center;margin-bottom:6px; }
#dev-slider { -webkit-appearance:none;width:100%;height:4px;background:var(--border);border-radius:999px;outline:none;cursor:pointer; }
#dev-slider::-webkit-slider-thumb { -webkit-appearance:none;width:20px;height:20px;border-radius:50%;background:var(--accent);border:3px solid white;box-shadow:var(--sh-sm); }
</style>
</head>
<body>

<script>
const CONFIG = {
  MIND_FILE:      'targets.mind',
  REVEAL_PHOTO:   'reveal.jpg',

  /*
    箱子尺寸說明：
    - 頂面/正面 marker：0.45 × 0.3 m，取寬邊 0.45
    - 側面 marker：0.3 × 0.3 m
    多面追蹤時程式會自動切換 activeMarkerWidth。
    預設用頂/正面寬邊。
  */
  MARKER_WIDTH_LARGE: 0.45,   /* 頂面/正面 */
  MARKER_WIDTH_SMALL: 0.30,   /* 側面 */
  MARKER_WIDTH_M: 0.45,       /* 目前使用的寬（會由 activeAnchor 動態切換） */

  DIST_FAR:    2.5,
  DIST_MID:    0.55,
  DIST_CLOSE:  0.35,
  DIST_REVEAL: 0.45,   /* 45 cm — MindAR loses tracking closer than this */
  DEV_MODE:    false,
};
</script>

<!-- AR camera layer -->
<div id="ar-container"></div>

<!-- ══ ENTRY ══ -->
<div class="screen active" id="screen-entry">
  <div class="entry-scroll">
    <div class="notif-bar">
      <div class="notif-dot"></div>
      <span class="notif-text">快遞通知</span>
      <span class="notif-time" id="entry-time">--:--</span>
    </div>
    <div class="delivery-card">
      <div class="dc-top">
        <div class="dc-icon">📦</div>
        <div>
          <div class="dc-title">快遞包裹抵達</div>
          <div class="dc-sub">您的包裹已送達指定地點<br>請盡快取件確認</div>
        </div>
      </div>
      <div class="dc-status">
        <div class="dc-sdot"></div>
        <span>等待確認取件 · 需現場掃描</span>
      </div>
      <div class="dc-addr">📍 &nbsp;包裹外層貼有水果圖案</div>
    </div>
    <div class="msg-card" onclick="startAR()">
      <div class="mc-avt">
        <!-- Anonymous person silhouette -->
        <svg width="28" height="28" viewBox="0 0 28 28" fill="none" xmlns="http://www.w3.org/2000/svg">
          <circle cx="14" cy="10" r="5" fill="rgba(255,255,255,0.75)"/>
          <path d="M4 26c0-5.523 4.477-10 10-10s10 4.477 10 10" stroke="rgba(255,255,255,0.75)" stroke-width="2" stroke-linecap="round" fill="none"/>
        </svg>
        <div class="mc-badge">1</div>
      </div>
      <div class="mc-body">
        <div class="mc-name">陌生來電 · 未知號碼</div>
        <div class="mc-prev">嘿，那個箱子⋯⋯能幫我看一下嗎？</div>
      </div>
      <div class="mc-time">剛剛</div>
    </div>
    <button class="open-btn" id="open-btn" onclick="startAR()">
      <span style="font-size:18px;line-height:1;">💬</span> 開啟訊息
    </button>
    <div class="entry-hint" id="entry-hint" style="visibility:hidden">需要相機權限 · 請使用 HTTPS 環境<br>建議 iPhone Safari / Android Chrome</div>
  </div>
</div>

<!-- ══ LOADING ══ -->
<div class="screen" id="screen-loading">

/* Pre-chat fruit replies */

/* Replies to fruit picks */
const REPLIES = {

/* Proximity guidance — stateful, direction-aware */
let proxMsgIdx = 0;
let lastProxDist = 999;
let tooCloseMsgSent = false;

function maybeShowProxMsg(dist) {
  /* Too close to detect — tell user to back up (only once per close-approach) */
  if (dist > 0 && dist < 0.35 && !tooCloseMsgSent) {
    tooCloseMsgSent = true;
    addARMsg('太近了⋯⋯退後一點，讓我看清楚全貌。');
    return;
  }
  /* Reset too-close flag when backed up sufficiently */
  if (dist > 0.6) tooCloseMsgSent = false;

  /* Sequential approach messages — only trigger when actually getting closer */
  const PROX_STEPS = [
    { dist: 1.8, text: '你看到那個箱子了嗎？\n把鏡頭對準它。' },
    { dist: 1.2, text: '選幾個水果告訴我。' },
    { dist: 0.7, text: '繼續靠近箱子⋯⋯\n用走的，不是用鏡頭拉近。' },
    { dist: 0.5, text: '再近一點。' },
  ];
  if (proxMsgIdx >= PROX_STEPS.length) return;
  const next = PROX_STEPS[proxMsgIdx];
  /* Only advance if user is actually approaching */
  if (dist <= next.dist && dist < lastProxDist) {
    addARMsg(next.text);
    proxMsgIdx++;
  }
  lastProxDist = dist;
}

/* Reveal chat — voice of someone trapped inside, looking out through a crack */
const REVEAL_CHAT_FAST = [

];
const REVEAL_CHAT_SLOW = [

  { text: '我在這裡的時候沒有時間感。', delay: 1800 },
  { text: '但我感覺得到有人靠近。', delay: 1400 },
  { photo: true, delay: 2200 },
  { text: '這是我能看到的樣子。', delay: 800 },
  { text: '你用的那個介面⋯⋯\n是我設計的。', delay: 1600 },
  { text: '我設計它的時候就知道\n它裝不下真實的東西。', delay: 1600 },
  { text: '但我還是設計了它。', delay: 1000 },
];

/* Reveal — user never detected the box */
const REVEAL_CHAT_NO_BOX = [
  { text: '你⋯⋯沒有拍到箱子。' },
  { text: '沒關係。\n很多人都沒有。', delay: 1600 },
  { text: '也許你根本不需要靠近\n才能知道裡面是什麼。', delay: 1800 },
  { photo: true, delay: 2000 },
  { text: '你用的那個介面⋯⋯\n是我設計的。', delay: 1600 },
  { text: '就算你沒有靠近，\n答案也不在那六個選項裡。', delay: 1600 },
];
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id)?.classList.add('active');
}
function ts() {
  const n = new Date();
  return `${n.getHours().toString().padStart(2,'0')}:${n.getMinutes().toString().padStart(2,'0')}`;
}
function wait(ms) { return new Promise(r => setTimeout(r, ms)); }

/* Clock */
setInterval(() => {
  const el = document.getElementById('entry-time');
  if (el) el.textContent = ts();
}, 1000);

/* ─── PRE-CHAT ───────────────────────── */
function addPreMsg(text) {
  const feed  = document.getElementById('pre-feed');
  const tdots = document.getElementById('pre-typing');
  const div = document.createElement('div');
  div.className = 'msg msg-sys';
  div.innerHTML = `<div class="m-avt"><svg width="16" height="16" viewBox="0 0 28 28" fill="none"><circle cx="14" cy="10" r="5" fill="rgba(255,255,255,0.8)"/><path d="M4 26c0-5.523 4.477-10 10-10s10 4.477 10 10" stroke="rgba(255,255,255,0.8)" stroke-width="2.2" stroke-linecap="round" fill="none"/></svg></div>
    <div><div class="bubble">${text.replace(/\n/g,'<br>')}</div>
    <div class="b-meta">${ts()}</div></div>`;
  feed.insertBefore(div, tdots);
  requestAnimationFrame(() => requestAnimationFrame(() => div.classList.add('in')));
  setTimeout(() => { feed.scrollTop = feed.scrollHeight; }, 80);
}
function showPreTyping()  { document.getElementById('pre-typing').classList.add('in'); }
function hidePreTyping()  { document.getElementById('pre-typing').classList.remove('in'); }

async function runPreChat() {
  for (const step of PRE_CHAT) {
    showPreTyping();
    /* Typing duration: realistic per character */
    await wait(1000 + step.text.replace(/\n/g,'').length * 32 + Math.random()*400);
    hidePreTyping();
    addPreMsg(step.text);
    if (step.action === 'show-pre-options') {
      await wait(900);
      document.getElementById('pre-options-dock').style.display = 'block';
      const feed = document.getElementById('pre-feed');
      setTimeout(() => { feed.scrollTop = feed.scrollHeight; }, 80);
      return;
    }
    /* Longer reading pause between messages */
    await wait(1400 + Math.random()*600);
  }
}

/* User picks fruit in pre-chat */
let prePickDone = false;
async function pickPreFruit(el) {
  if (prePickDone) return;
  prePickDone = true;

  const label = el.dataset.label;
  el.classList.add('selected');

  /* Show user message */
  const feed  = document.getElementById('pre-feed');
  const tdots = document.getElementById('pre-typing');
  const userDiv = document.createElement('div');
  userDiv.className = 'msg msg-usr in';
  userDiv.innerHTML = `<div><div class="bubble">${label}</div><div class="b-meta">${ts()}</div></div>`;
  feed.insertBefore(userDiv, tdots);
  setTimeout(() => { feed.scrollTop = feed.scrollHeight; }, 80);

  /* Hide options */
  document.getElementById('pre-options-dock').style.display = 'none';

  /* Reply */
  await wait(400);
  showPreTyping();
  const rs = PRE_REPLIES[label] || ['⋯⋯'];
  const reply = rs[Math.floor(Math.random() * rs.length)];
  await wait(700 + reply.replace(/\n/g,'').length * 28);
  hidePreTyping();
  addPreMsg(reply);

  /* Transition — show camera button after enough reading time */
  await wait(1600);
  addPreMsg('能幫我開鏡頭對準那個箱子嗎？選標籤告訴我它現在的狀態。');
  await wait(1800);
  document.getElementById('pre-cam-btn').style.display = 'flex';
  setTimeout(() => { feed.scrollTop = feed.scrollHeight; }, 80);
}

/* ─── START AR ───────────────────────── */
async function startAR() {
  showScreen('screen-loading');
  S.phase = 'loading';

  try {
    await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } });
  } catch {
    const hint = document.getElementById('entry-hint');
    if (hint && hint.style.visibility === 'visible') {
      /* Already shown hint — second failure: show alert */
      alert('無法取得相機權限。\n請確認：\n① 使用 HTTPS 網址\n② iPhone 請用 Safari\n③ Android 請用 Chrome\n④ 瀏覽器設定中允許此網站使用相機');
    } else {
      if (hint) { hint.style.visibility = 'visible'; hint.style.color = 'var(--accent)'; }
    }
    showScreen('screen-entry'); return;
  }

  await new Promise(r => {
    if (window._mindARReady) return r();
    window.addEventListener('mindar-ready', r, { once: true });
  });

  S.mindar = new window.MindARThree({
    container: document.getElementById('ar-container'),
    imageTargetSrc: CONFIG.MIND_FILE,
    maxTrack: 1,
    uiLoading: 'no', uiScanning: 'no', uiError: 'no',
    cameraDeviceId: await rearCam(),
    videoConstraint: {
      facingMode: 'environment',
      width:  { ideal: 1280 },
      height: { ideal: 720 },
    },
    /* Close-range tracking optimisation:
       filterMinCF very low = tracks at steep angles and close distances
       filterBeta high = fast response, less lag when moving
       missTolerance high = doesn't give up quickly when briefly occluded
       warmupTolerance low = fast target acquisition */
    filterMinCF:     0.00001,
    filterBeta:      10000,
    missTolerance:   15,
    warmupTolerance: 2,
  });

  const { renderer, scene, camera } = S.mindar;
  renderer.outputColorSpace = 'srgb';

  /* ── Multi-face anchors ──────────────────────────────────────────
     targets.mind can contain up to 6 image targets (one per box face).
     We register an anchor for each available target index (0–5).
     The one currently visible drives distance estimation.
     Compile all face images together at:
     https://hiukim.github.io/mind-ar-js-doc/tools/compile
  ──────────────────────────────────────────────────────────────── */
  const NUM_FACES = 3;   /* ← change to however many images you compiled */
  const anchors = [];
  let activeAnchor = null;

  for (let i = 0; i < NUM_FACES; i++) {
    const a = S.mindar.addAnchor(i);
    /* Large face (index 0) = top/front, rest = sides */
    a._markerWidth = (i === 0) ? CONFIG.MARKER_WIDTH_LARGE : CONFIG.MARKER_WIDTH_SMALL;
    a.onTargetFound = () => {
      S.markerVisible = true;
      activeAnchor = a;
      CONFIG.MARKER_WIDTH_M = a._markerWidth;
      /* Full reset — force immediate jump to first real reading */
      distBuffer.length = 0;
      S.estimatedDist = 999;
      S.lastDist = 999;
      /* Show dist pill, clear stale value */
      document.getElementById('dp-val').textContent = '⋯⋯';
      document.getElementById('dist-pill').classList.add('visible');
      if (S.phase === 'ar') onTargetFound();
    };
    a.onTargetLost = () => {
      if (activeAnchor === a) {
        S.markerVisible = false;
        activeAnchor = null;
        /* Hide dist pill — don't show stale frozen value */
        document.getElementById('dist-pill').classList.remove('visible');
        document.getElementById('dp-val').textContent = '-- m';
        /* Clear buffer so old values don't corrupt next sighting */
        distBuffer.length = 0;
        S.estimatedDist = 999;
        S.lastDist = 999;
      }
    };
    anchors.push(a);
  }

  document.getElementById('ar-container').classList.add('active');
  try { await S.mindar.start(); } catch(e) { console.warn(e); }

  if (CONFIG.DEV_MODE) document.getElementById('dev-wrap').classList.add('show');

  renderer.setAnimationLoop(() => {
    renderer.render(scene, camera);
    if (S.markerVisible && activeAnchor && S.phase === 'ar') estimateDist(activeAnchor);
  });

  /* Show pre-chat first */
  S.phase = 'pre-chat';
  showScreen('screen-loading'); /* hide loading */
  document.getElementById('screen-loading').classList.remove('active');
  document.getElementById('chat-pre').classList.add('active');
  runPreChat();
}

/* ─── OPEN AR PHASE ─────────────────── */
function openARPhase() {
  S.phase = 'ar';
  document.getElementById('chat-pre').classList.remove('active');
  document.getElementById('ar-container').classList.add('active');
  document.getElementById('ar-ux').classList.add('active');
  document.getElementById('dist-pill').classList.add('visible');
  startIdleNudge();
}

/* Idle nudge: if user hasn't interacted, remind them every ~14s */
const NUDGE_MSGS = [
  '你認為包裹裡面是什麼？',
  '鏡頭對準箱子⋯⋯我想看看它的樣子。',
  '選一個標籤告訴我。',
  '還在嗎？',
];
let nudgeTimer = null;
let nudgeIdx   = 0;
let lastInteractTime = Date.now();

function resetIdleTimer() { lastInteractTime = Date.now(); }

function startIdleNudge() {
  nudgeTimer = setInterval(() => {
    if (S.phase !== 'ar') { clearInterval(nudgeTimer); return; }
    const idle = Date.now() - lastInteractTime;
    if (idle >= 12000 && arMsgQueue.length === 0 && !arMsgBusy) {
      addARMsg(NUDGE_MSGS[nudgeIdx % NUDGE_MSGS.length]);
      nudgeIdx++;
      lastInteractTime = Date.now();
    }
  }, 3000);
}

/* ─── TARGET FOUND ──────────────────── */
let targetFoundOnce = false;
function onTargetFound() {
  if (targetFoundOnce) return;
  targetFoundOnce = true;
  initDecayOrder();
  /* Small delay before first message so user can see the camera view first */
  setTimeout(() => {
    addARMsg('找到了。\n選一個水果告訴我⋯⋯你覺得裡面是什麼？');
  }, 1200);
}

/* ─── AR MESSAGES — queued with typing delay, max 2 visible ── */
let arMsgQueue = [];
let arMsgBusy  = false;

function addARMsg(text) {
  arMsgQueue.push(text);
  if (!arMsgBusy) drainARQueue();
}

async function drainARQueue() {
  arMsgBusy = true;
  while (arMsgQueue.length > 0) {
    const text = arMsgQueue.shift();
    await showARMsgWithTyping(text);
    /* small pause between consecutive messages */
    if (arMsgQueue.length > 0) await new Promise(r => setTimeout(r, 300));
  }
  arMsgBusy = false;
}

async function showARMsgWithTyping(text) {
  const stream = document.getElementById('ar-msgs');

  /* Show typing indicator */
  const typingRow = document.createElement('div');
  typingRow.className = 'ar-bubble-row';
  typingRow.innerHTML = `<div class="ar-avt"><svg width="16" height="16" viewBox="0 0 28 28" fill="none"><circle cx="14" cy="10" r="5" fill="rgba(255,255,255,0.8)"/><path d="M4 26c0-5.523 4.477-10 10-10s10 4.477 10 10" stroke="rgba(255,255,255,0.8)" stroke-width="2.2" stroke-linecap="round" fill="none"/></svg></div>
    <div class="ar-bubble" style="padding:10px 16px">
      <span class="ar-typing-dot"></span>
      <span class="ar-typing-dot"></span>
      <span class="ar-typing-dot"></span>
    </div>`;
  stream.appendChild(typingRow);
  requestAnimationFrame(() => requestAnimationFrame(() => typingRow.classList.add('in')));

  /* Enforce max 2 rows — fade oldest immediately */
  pruneARRows(stream, 2);

  /* Wait proportional to text length */
  const delay = 600 + text.length * 28 + Math.random() * 200;
  await new Promise(r => setTimeout(r, delay));

  /* Replace typing indicator with real message */
  typingRow.querySelector('.ar-bubble').innerHTML = text;

  /* Ensure still max 2 after adding */
  pruneARRows(stream, 2);
}

function pruneARRows(stream, max) {
  const rows = stream.querySelectorAll('.ar-bubble-row');
  if (rows.length > max) {
    for (let i = 0; i < rows.length - max; i++) {
      const old = rows[i];
      old.style.transition = 'opacity 0.35s';
      old.style.opacity = '0';
      setTimeout(() => old.remove(), 380);
    }
  }
}

/* ─── FRUIT PICK ─────────────────────── */
let fruitCooldown = false;
const replyCounters = {};   /* track how many times each label has been picked */

function pickFruit(el) {
  if (!el) return;
  if (el.style.pointerEvents === 'none') return;
  if (fruitCooldown) return;

  const label = el.dataset.label;
  if (!label) return;

  fruitCooldown = true;
  resetIdleTimer();

  /* Cross-pick memory: if switching to a different fruit, sometimes reference the last pick */
  const lastLabel = S.selectedLabels.length > 0 ? S.selectedLabels[S.selectedLabels.length - 1] : null;
  const switching = lastLabel && lastLabel !== label && lastLabel !== '⋯⋯' && label !== '⋯⋯';

  S.selectedLabels.push(label);
  S.fruitsChosen++;

  /* Flash selected state */
  el.classList.add('selected');
  setTimeout(() => el.classList.remove('selected'), 1800);

  /* Cycle through replies in order; after exhausting all, use sceptical loop */
  const rs = REPLIES[label] || ['⋯⋯'];
  const pickCount = replyCounters[label] || 0;
  replyCounters[label] = pickCount + 1;

  let reply;
  /* First time switching to a new fruit after having picked a different one — cross-reference */
  if (switching && pickCount === 0 && S.fruitsChosen > 1) {
    const crossReplies = [
      `剛才是${lastLabel}，現在是${label}。\n你自己也不確定嗎？`,
      `你換了。\n從${lastLabel}換到${label}。\n為什麼？`,
      `${lastLabel}不夠嗎？`,
    ];
    reply = crossReplies[Math.floor(Math.random() * crossReplies.length)];
  } else if (pickCount < rs.length) {
    reply = rs[pickCount];
  } else {
    const sceptical = [
      '你已經選過這個了。',
      '這裡只有六個選項。',
      '你是認真的嗎？',
      '我知道選項不夠用。',
      '還是說，你只是在測試我？',
      '⋯⋯',
      '你用的那個介面，是我設計的。',
      '沒有其他的了嗎？',
    ];
    reply = sceptical[(pickCount - rs.length) % sceptical.length];
  }

  setTimeout(() => {
    addARMsg(reply);
    /* After 3 picks: prompt to approach physically */
    if (S.fruitsChosen === 3) {
      setTimeout(() => addARMsg('好了⋯⋯現在靠近箱子。\n用走的，不是用鏡頭。'), 1600);
    }
    /* After 8 picks without approaching: trigger reveal directly */
    if (S.fruitsChosen >= 8 && !revealDone) {
      setTimeout(() => {
        addARMsg('你一直在選⋯⋯\n但你沒有靠近。');
        setTimeout(() => triggerReveal(), 2000);
      }, 1200);
    }
    setTimeout(() => { fruitCooldown = false; }, 1200);
  }, 400);
}

/* ─── DISTANCE ───────────────────────── */
async function rearCam() {
  try {
    const d = await navigator.mediaDevices.enumerateDevices();
    const c = d.filter(x => x.kind === 'videoinput');
    if (c.length <= 1) return undefined;
    const r = c.find(x => /back|rear|environment/i.test(x.label));
    return r ? r.deviceId : c[c.length - 1].deviceId;
  } catch { return undefined; }
}

/* ─── DISTANCE ESTIMATION ────────────────────────── */
const distBuffer = [];
const DIST_BUF_SIZE = 6;

function estimateDist(anchor) {
  if (!anchor.group || !window.THREE) return;
  const cam = S.mindar.camera;
  const l = new window.THREE.Vector3(-0.5, 0, 0);
  const r = new window.THREE.Vector3( 0.5, 0, 0);
  l.applyMatrix4(anchor.group.matrixWorld);
  r.applyMatrix4(anchor.group.matrixWorld);
  l.project(cam); r.project(cam);
  const cW = S.mindar.renderer.domElement.clientWidth;
  const px = Math.abs(r.x - l.x) * cW / 2;

  /* Need a meaningful pixel width */
  if (px < 8) return;

  const fov = (cam.fov * Math.PI) / 180;
  const fc  = (cW / 2) / Math.tan(fov / 2);
  const rawDist = (CONFIG.MARKER_WIDTH_M * fc) / px;

  /* Hard clamp — physically impossible values discarded immediately */
  if (rawDist < 0.04 || rawDist > 5.0) return;

  /* Adaptive spike rejection — tighter multiplier when already close */
  if (distBuffer.length >= 3) {
    const sorted = [...distBuffer].sort((a,b) => a-b);
    const med = sorted[Math.floor(sorted.length / 2)];
    const multiplier = med < 0.5 ? 1.4 : 1.8;
    if (rawDist > med * multiplier) return;
  }

  distBuffer.push(rawDist);
  if (distBuffer.length > DIST_BUF_SIZE) distBuffer.shift();

  const sorted = [...distBuffer].sort((a,b) => a-b);
  const median = sorted[Math.floor(sorted.length / 2)];

  let smooth;
  if (S.estimatedDist > 4.5) {
    smooth = median;  /* cold start — jump immediately */
  } else {
    const approaching = median < S.estimatedDist;
    /* Approaching: fast (0.75). Receding: very slow (0.08) to suppress noise spikes */
    const alpha = approaching ? 0.75 : 0.08;
    smooth = S.estimatedDist * (1 - alpha) + median * alpha;
  }

  processDist(smooth);
}

function processDist(dist) {
  const now = Date.now();
  const delta = S.lastDist - dist;

  if (delta > 0.02 && dist < CONFIG.DIST_FAR) {
    if (!S.approachStartTime) S.approachStartTime = now;
    S.approachDuration += now - (S.lastDistTime || now);
  }
  if (delta < -0.06 && dist < CONFIG.DIST_MID) S.hesitationCount++;

  S.lastDist = dist; S.lastDistTime = now; S.estimatedDist = dist;

  updateDistUI(dist);
  maybeShowProxMsg(dist);
  /* Fruit decay removed — buttons always stay visible */

  /* Reveal: requires BOTH sufficient picks AND close enough distance */
  if (dist <= CONFIG.DIST_REVEAL && S.phase === 'ar' && !revealDone) {
    if (S.fruitsChosen >= 3) {
      triggerReveal();
    } else {
      if (!window._nudgeSent) {
        window._nudgeSent = true; /* permanent — never resets */
        addARMsg('先多選幾個水果⋯⋯再靠近。');
      }
    }
  }
}

function devSim(v) {
  const dist = v / 100;
  if (S.phase === 'pre-chat') {
    openARPhase();
    S.markerVisible = true;
  }
  if (S.phase === 'ar') {
    S.markerVisible = true;
    if (!targetFoundOnce) onTargetFound();
    processDist(dist);
  }
}

/* ─── DISTANCE UI ────────────────────── */
function updateDistUI(dist) {
  document.getElementById('dp-val').textContent = dist.toFixed(2) + ' m';
  const prox = Math.max(0, Math.min(1, 1 - (dist - CONFIG.DIST_REVEAL) / (CONFIG.DIST_FAR - CONFIG.DIST_REVEAL)));
  document.getElementById('dp-dot').style.boxShadow =
    `0 0 ${6 + prox * 14}px rgba(255,92,92,${0.6 + prox * 0.4})`;
}

/* ─── FRUIT DECAY ────────────────────── */
/* Random decay order computed once when AR starts */
let decayOrder = null;   /* array of btn indices in random disappear order */

function initDecayOrder() {
  const btns = document.querySelectorAll('#fruit-grid .f-btn');
  const indices = Array.from({ length: btns.length }, (_, i) => i);
  /* Fisher-Yates shuffle */
  for (let i = indices.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [indices[i], indices[j]] = [indices[j], indices[i]];
  }
  /* The last index in shuffled order is the one that NEVER disappears */
  decayOrder = indices;
}

function updateFruitDecay(dist) {
  if (!decayOrder) initDecayOrder();

  const decay = Math.max(0, Math.min(1,
    (CONFIG.DIST_MID - dist) / (CONFIG.DIST_MID - CONFIG.DIST_REVEAL)
  ));

  const btns = Array.from(document.querySelectorAll('#fruit-grid .f-btn'));
  const total = btns.length;
  const canDisappear = total - 1;   /* last in decayOrder always stays */

  decayOrder.forEach((btnIdx, rank) => {
    const btn = btns[btnIdx];
    if (!btn) return;

    /* Last button in decayOrder: permanently visible */
    if (rank === total - 1) {
      btn.classList.remove('decay-1','decay-2','decay-3','decay-gone');
      btn.style.pointerEvents = '';
      return;
    }

    /* Each button's fade window based on its rank in random order */
    const pos      = rank / canDisappear;
    const fadeStart = pos * 0.7;
    const fadeEnd   = fadeStart + 0.25;
    const p = Math.max(0, Math.min(1, (decay - fadeStart) / (fadeEnd - fadeStart)));

    btn.classList.remove('decay-1','decay-2','decay-3','decay-gone');
    if      (p === 0)  { btn.style.pointerEvents = ''; }
    else if (p < 0.33) { btn.classList.add('decay-1'); btn.style.pointerEvents = ''; }
    else if (p < 0.66) { btn.classList.add('decay-2'); btn.style.pointerEvents = ''; }
    else if (p < 1)    { btn.classList.add('decay-3'); btn.style.pointerEvents = 'none'; }
    else               { btn.classList.add('decay-gone'); btn.style.pointerEvents = 'none'; }
  });
}

/* ─── REVEAL ─────────────────────────── */
let revealDone = false;
async function triggerReveal() {
  if (revealDone) return;
  revealDone = true;
  S.phase = 'reveal';

  /* Stop AR */
  if (S.mindar) { try { S.mindar.pause(); } catch {} }
  document.getElementById('ar-container').classList.remove('active');
  document.getElementById('ar-ux').classList.remove('active');
  document.getElementById('dev-wrap').classList.remove('show');

  /* Pick reveal script based on behaviour */
  let script;
  if (!targetFoundOnce) {
    /* Never detected the box */
    script = REVEAL_CHAT_NO_BOX;
  } else {
    const fast = S.approachDuration < 7000 && S.hesitationCount === 0;
    const hes  = S.hesitationCount >= 2;
    script = fast ? REVEAL_CHAT_FAST : hes ? REVEAL_CHAT_HES : REVEAL_CHAT_SLOW;
  }

  /* Show reveal chat */
  document.getElementById('chat-reveal').classList.add('active');

  /* Run script */
  for (const step of script) {
    await wait(step.delay ?? 600);
    if (step.photo) {
      showRevealPhoto();
    } else {
      showRevealTyping();
      await wait(800 + step.text.length * 25);
      hideRevealTyping();
      addRevealMsg(step.text);
    }
  }

  /* Show exit notice */
  await wait(2000);
  addRevealSystemMsg('陌生號碼已退出聊天');

  /* Show countdown timer */
  await wait(3000);
  addRevealEndCard();
}

function addRevealMsg(text) {
  const feed  = document.getElementById('reveal-feed');
  const tdots = document.getElementById('reveal-typing');
  const div = document.createElement('div');
  div.className = 'msg msg-sys';
  div.innerHTML = `<div class="m-avt"><svg width="16" height="16" viewBox="0 0 28 28" fill="none"><circle cx="14" cy="10" r="5" fill="rgba(255,255,255,0.8)"/><path d="M4 26c0-5.523 4.477-10 10-10s10 4.477 10 10" stroke="rgba(255,255,255,0.8)" stroke-width="2.2" stroke-linecap="round" fill="none"/></svg></div>
    <div><div class="bubble">${text.replace(/\n/g,'<br>')}</div>
    <div class="b-meta">${ts()}</div></div>`;
  feed.insertBefore(div, tdots);
  requestAnimationFrame(() => requestAnimationFrame(() => div.classList.add('in')));
  setTimeout(() => { feed.scrollTop = feed.scrollHeight; }, 80);
}

function addRevealSystemMsg(text) {
  const feed  = document.getElementById('reveal-feed');
  const tdots = document.getElementById('reveal-typing');
  const div = document.createElement('div');
  div.className = 'date-div';
  div.style.opacity = '0';
  div.style.transition = 'opacity 0.8s ease';
  div.innerHTML = `<span>${text}</span>`;
  feed.insertBefore(div, tdots);
  requestAnimationFrame(() => requestAnimationFrame(() => { div.style.opacity = '1'; }));
  setTimeout(() => { feed.scrollTop = feed.scrollHeight; }, 80);
}

function addRevealEndCard() {
  const feed  = document.getElementById('reveal-feed');
  const tdots = document.getElementById('reveal-typing');
  const div = document.createElement('div');
  div.style.cssText = 'text-align:center;padding:20px 16px 8px;opacity:0;transition:opacity 1s ease;';
  const counterId = 'reload-counter';
  div.innerHTML = `<div style="font-size:12px;color:var(--text-ter);letter-spacing:0.05em;"><span id="${counterId}">30</span> 秒後重製頁面</div>`;
  feed.insertBefore(div, tdots);
  requestAnimationFrame(() => requestAnimationFrame(() => { div.style.opacity = '1'; }));
  setTimeout(() => { feed.scrollTop = feed.scrollHeight; }, 80);

  /* Countdown */
  let remaining = 30;
  const tick = setInterval(() => {
    remaining--;
    const el = document.getElementById(counterId);
    if (el) el.textContent = remaining;
    if (remaining <= 0) { clearInterval(tick); location.reload(); }
  }, 1000);
}

function showRevealPhoto() {
  const feed  = document.getElementById('reveal-feed');
  const tdots = document.getElementById('reveal-typing');

  /* Build: .photo-row > .m-avt + .photo-bubble > img + .photo-cap */
  const row = document.createElement('div');
  row.className = 'photo-row';

  const avt = document.createElement('div');
  avt.className = 'm-avt';
  avt.innerHTML = '<svg width="16" height="16" viewBox="0 0 28 28" fill="none"><circle cx="14" cy="10" r="5" fill="rgba(255,255,255,0.8)"/><path d="M4 26c0-5.523 4.477-10 10-10s10 4.477 10 10" stroke="rgba(255,255,255,0.8)" stroke-width="2.2" stroke-linecap="round" fill="none"/></svg>';

  const photo = document.createElement('div');
  photo.className = 'photo-bubble';

  if (CONFIG.REVEAL_PHOTO) {
    const img = document.createElement('img');
    img.alt  = '箱內視角';
    img.style.cssText = 'width:100%;display:block;height:auto;filter:saturate(0.4) brightness(0.65) blur(1px);';
    img.onerror = () => {
      img.style.display = 'none';
      const fb = document.createElement('div');
      fb.style.cssText = 'width:100%;aspect-ratio:1;background:#1a1a1a;display:flex;align-items:center;justify-content:center;font-size:80px;filter:blur(2px) brightness(0.5)';
      fb.textContent = '🍊';
      photo.insertBefore(fb, null);
    };
    photo.appendChild(img);
    img.src = CONFIG.REVEAL_PHOTO;
  } else {
    const gen = document.createElement('div');
    gen.style.cssText = 'width:100%;aspect-ratio:1;background:#1a1a1a;display:flex;align-items:center;justify-content:center;font-size:80px;filter:blur(2px) brightness(0.5)';
    gen.textContent = '🍊';
    photo.appendChild(gen);
  }

  row.appendChild(avt);
  row.appendChild(photo);
  feed.insertBefore(row, tdots);
  requestAnimationFrame(() => requestAnimationFrame(() => row.classList.add('in')));
  setTimeout(() => { feed.scrollTop = feed.scrollHeight; }, 80);
}

function showRevealTyping()  { document.getElementById('reveal-typing').classList.add('in'); }
function hideRevealTyping()  { document.getElementById('reveal-typing').classList.remove('in'); }
