<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<link rel="icon" href="data:,">
<title>不在選項裡 · Out of Options</title>

<!--
  替換清單：
  1. targets.mind → https://hiukim.github.io/mind-ar-js-doc/tools/compile
  2. reveal.jpg   → 從箱內拍攝的真實照片，同資料夾
  3. MARKER_WIDTH_M → 你實際印出的 marker 寬度（公尺），預設 0.12
  4. DEV_MODE: false → 展場正式使用前改掉
-->

<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.152.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.152.0/examples/jsm/",
    "mindar-image-three": "https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-three.prod.js"
  }
}
</script>
<script type="module">
  import * as THREE from 'three';
  import { MindARThree } from 'mindar-image-three';
  window.THREE = THREE;
  window.MindARThree = MindARThree;
  window._mindARReady = true;
  window.dispatchEvent(new Event('mindar-ready'));
</script>

<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
:root {
  --bg:        #F2F4F7;
  --surface:   #FFFFFF;
  --surface2:  #F7F8FA;
  --border:    #E8EAED;
  --text-pri:  #1C1E21;
  --text-sec:  #65676B;
  --text-ter:  #90949C;
  --accent:    #FF5C5C;
  --accent-lt: #FFF0F0;
  --blue:      #1877F2;
  --green:     #31A24C;
  --r-sm:10px; --r-md:16px; --r-lg:22px; --r-pill:999px;
  --sh-sm: 0 1px 4px rgba(0,0,0,0.10);
  --sh-md: 0 4px 16px rgba(0,0,0,0.12);
  --sh-lg: 0 12px 40px rgba(0,0,0,0.20);
}

* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
html, body {
  width:100%; height:100%;
  font-family:'Noto Sans TC',-apple-system,BlinkMacSystemFont,sans-serif;
  background:#000; color:var(--text-pri);
  overflow:hidden; position:fixed;
}

/* ══════════════════════════════
   SCREENS
══════════════════════════════ */
.screen {
  position:fixed; inset:0; z-index:20;
  display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  opacity:0; pointer-events:none;
  transition:opacity 0.45s ease;
  background:var(--bg);
}
.screen.active { opacity:1; pointer-events:all; }

/* ══════════════════════════════
   ENTRY
══════════════════════════════ */
#screen-entry { justify-content:flex-start; }
.entry-scroll {
  width:100%; max-width:460px; height:100%;
  overflow-y:auto; padding:32px 20px 48px;
  display:flex; flex-direction:column; gap:14px;
  scrollbar-width:none;
}
.entry-scroll::-webkit-scrollbar { display:none; }

.notif-bar { display:flex; align-items:center; gap:8px; padding-bottom:4px; }
.notif-dot { width:8px;height:8px;border-radius:50%;background:var(--accent);box-shadow:0 0 0 3px var(--accent-lt); }
.notif-text { font-size:12px; color:var(--text-sec); }
.notif-time { margin-left:auto; font-size:11px; color:var(--text-ter); }

.delivery-card {
  background:var(--surface); border-radius:var(--r-lg);
  box-shadow:var(--sh-md); padding:20px;
  display:flex; flex-direction:column; gap:14px;
}
.dc-top { display:flex; align-items:center; gap:14px; }
.dc-icon { width:52px;height:52px;border-radius:var(--r-md);background:var(--accent-lt);display:flex;align-items:center;justify-content:center;font-size:28px;flex-shrink:0; }
.dc-title { font-size:16px; font-weight:600; margin-bottom:3px; }
.dc-sub   { font-size:13px; color:var(--text-sec); line-height:1.5; }
.dc-status { display:flex;align-items:center;gap:8px;padding:10px 14px;background:#FFF8E7;border-radius:var(--r-sm);border-left:3px solid #FFB300; }
.dc-sdot { width:8px;height:8px;border-radius:50%;background:#FFB300;flex-shrink:0;animation:blink 1.5s ease-in-out infinite; }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.25} }
.dc-status span { font-size:13px; font-weight:500; color:#8A6000; }
.dc-addr { font-size:12px; color:var(--text-ter); display:flex; align-items:center; gap:6px; }

.msg-card {
  background:var(--surface); border-radius:var(--r-lg);
  box-shadow:var(--sh-sm); padding:16px 18px;
  display:flex; align-items:center; gap:14px;
  cursor:pointer; transition:transform 0.15s;
}
.msg-card:active { transform:scale(0.97); }
.mc-avt { width:46px;height:46px;border-radius:50%;background:linear-gradient(135deg,#FFB347,#FF5C5C);display:flex;align-items:center;justify-content:center;font-size:24px;flex-shrink:0;position:relative; }
.mc-badge { position:absolute;top:-2px;right:-2px;width:16px;height:16px;border-radius:50%;background:var(--accent);border:2px solid var(--surface);display:flex;align-items:center;justify-content:center;font-size:8px;color:#fff;font-weight:700; }
.mc-body { flex:1; min-width:0; }
.mc-name { font-size:15px; font-weight:600; margin-bottom:3px; }
.mc-prev { font-size:13px;color:var(--text-sec);white-space:nowrap;overflow:hidden;text-overflow:ellipsis; }
.mc-time { font-size:11px; color:var(--accent); font-weight:500; flex-shrink:0; }

.open-btn {
  width:100%; padding:16px;
  background:var(--accent); color:#fff;
  font-size:16px; font-weight:600;
  border:none; border-radius:var(--r-pill); cursor:pointer;
  box-shadow:0 4px 16px rgba(255,92,92,0.4);
  transition:all 0.2s; letter-spacing:0.03em;
}
.open-btn:active { transform:scale(0.97); box-shadow:none; }
.entry-hint { font-size:11px; color:var(--text-ter); text-align:center; line-height:1.8; }

/* ══════════════════════════════
   LOADING
══════════════════════════════ */
#screen-loading { gap:16px; }
.spin { width:44px;height:44px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin 1s linear infinite; }
@keyframes spin { to{transform:rotate(360deg)} }
.spin-label { font-size:13px; color:var(--text-sec); }

/* ══════════════════════════════
   PRE-SCAN: chat before AR
══════════════════════════════ */
#chat-pre {
  position:fixed; inset:0; z-index:20;
  display:flex; flex-direction:column;
  background:var(--bg);
  opacity:0; pointer-events:none; transition:opacity 0.45s;
}
#chat-pre.active { opacity:1; pointer-events:all; }

/* ══════════════════════════════
   AR LAYER (camera, always behind)
══════════════════════════════ */
#ar-container {
  position:fixed; inset:0; z-index:1;
  display:none;
}
#ar-container.active { display:block; }

/* ══════════════════════════════
   AR EXPERIENCE OVERLAY
   (transparent over camera)
══════════════════════════════ */
#ar-ux {
  position:fixed; inset:0; z-index:10;
  display:flex; flex-direction:column;
  pointer-events:none;
  opacity:0; transition:opacity 0.45s;
}
#ar-ux.active { opacity:1; pointer-events:all; }

/* Top: scan frame + messages */
.ar-top {
  flex:1; position:relative;
  display:flex; flex-direction:column;
  align-items:center; justify-content:flex-start;
  padding-top:52px; gap:12px;
  pointer-events:none;
}

/* Scan viewfinder (shown before target found) */
.scan-vf { width:180px; height:180px; position:relative; }
.vc { position:absolute; width:24px; height:24px; }
.vc.tl{top:0;left:0;border-top:3px solid var(--accent);border-left:3px solid var(--accent);border-radius:3px 0 0 0;}
.vc.tr{top:0;right:0;border-top:3px solid var(--accent);border-right:3px solid var(--accent);border-radius:0 3px 0 0;}
.vc.bl{bottom:0;left:0;border-bottom:3px solid var(--accent);border-left:3px solid var(--accent);border-radius:0 0 0 3px;}
.vc.br{bottom:0;right:0;border-bottom:3px solid var(--accent);border-right:3px solid var(--accent);border-radius:0 0 3px 0;}
.vsweep { position:absolute;left:3px;right:3px;height:2px;background:linear-gradient(90deg,transparent,var(--accent),transparent);border-radius:999px;animation:sweep 2.4s ease-in-out infinite;opacity:0.85; }
@keyframes sweep { 0%{top:3px;opacity:0}8%{opacity:0.85}92%{opacity:0.85}100%{top:175px;opacity:0} }
.scan-label { font-size:13px;font-weight:500;color:rgba(255,255,255,0.85);background:rgba(0,0,0,0.38);padding:6px 16px;border-radius:var(--r-pill);backdrop-filter:blur(4px);text-align:center; }

/* Target-found: incoming messages float over camera */
.ar-msg-stream {
  position:absolute; top:52px; left:0; right:0;
  display:flex; flex-direction:column; align-items:flex-start;
  gap:8px; padding:0 16px;
  pointer-events:none;
}
/* Avatar + bubble row */
.ar-bubble-row {
  display:flex; align-items:flex-end; gap:8px;
  max-width:88%;
  opacity:0; transform:translateY(6px);
  transition:all 0.35s ease;
}
.ar-bubble-row.in { opacity:1; transform:none; }
.ar-avt {
  width:28px; height:28px; border-radius:50%;
  background:linear-gradient(135deg,#FFB347,#FF5C5C);
  display:flex; align-items:center; justify-content:center;
  font-size:14px; flex-shrink:0;
}
.ar-bubble {
  padding:10px 14px;
  font-size:14px; line-height:1.5;
  background:rgba(255,255,255,0.93); color:var(--text-pri);
  border-radius:16px 16px 16px 4px;
  box-shadow:var(--sh-sm); backdrop-filter:blur(10px);
}

/* Distance pill */
.dist-pill {
  position:absolute; top:16px; right:16px;
  background:rgba(0,0,0,0.45); backdrop-filter:blur(8px);
  border-radius:var(--r-pill); padding:5px 12px;
  display:flex; align-items:center; gap:6px;
  pointer-events:none; opacity:0; transition:opacity 0.4s;
}
.dist-pill.visible { opacity:1; }
.dp-dot { width:6px;height:6px;border-radius:50%;background:var(--accent);box-shadow:0 0 6px rgba(255,92,92,0.8);transition:box-shadow 0.4s; }
.dp-val { font-size:12px;font-weight:600;color:#fff;font-family:monospace;min-width:40px; }

/* ══════════════════════════════
   BOTTOM DOCK (fruit options)
   Lives inside #ar-ux so it's
   always above the camera feed
══════════════════════════════ */
.ar-bottom {
  flex-shrink:0;
  background:rgba(255,255,255,0.93);
  backdrop-filter:blur(20px);
  border-top:1px solid rgba(255,255,255,0.5);
  border-radius:var(--r-lg) var(--r-lg) 0 0;
  padding:14px 16px 36px;
  box-shadow:0 -4px 20px rgba(0,0,0,0.14);
}
.dock-label {
  font-size:10px; font-weight:600; color:var(--text-ter);
  letter-spacing:0.12em; margin-bottom:10px;
  text-transform:uppercase;
}
.fruit-grid {
  display:grid; grid-template-columns:repeat(3,1fr); gap:7px;
}
.f-btn {
  display:flex; flex-direction:column; align-items:center;
  justify-content:center; gap:4px; padding:11px 6px;
  background:var(--surface2); border:1.5px solid var(--border);
  border-radius:var(--r-md); cursor:pointer; transition:all 0.2s;
  position:relative;
}
.f-btn:active { transform:scale(0.93); }
.f-btn.selected { background:var(--accent-lt); border-color:var(--accent); }

/* Decay states — smooth CSS transitions on each button */
.f-btn { transition: opacity 0.6s ease, transform 0.6s ease, filter 0.6s ease; }
.f-btn.decay-1 { opacity:0.7;  transform:scale(0.96) rotate(-1deg);              filter:blur(0.4px); }
.f-btn.decay-2 { opacity:0.45; transform:scale(0.90) rotate(3deg)  skewX(-4deg); filter:blur(1.2px) saturate(0.6); }
.f-btn.decay-3 { opacity:0.2;  transform:scale(0.75) rotate(-6deg) skewX(7deg);  filter:blur(3px)   saturate(0.2); pointer-events:none; }
.f-btn.decay-gone {
  opacity:0; transform:scale(0.05) rotate(25deg);
  filter:blur(12px); pointer-events:none; cursor:default;
}

.f-emoji { font-size:22px; line-height:1; pointer-events:none; }
.f-label { font-size:10px; font-weight:500; color:var(--text-sec); pointer-events:none; }
.f-btn.selected .f-label { color:var(--accent); }
.f-btn.decay-3 .f-label, .f-btn.decay-4 .f-label { color:var(--text-ter); }

/* ══════════════════════════════
   POST-AR CHAT (reveal)
══════════════════════════════ */
#chat-reveal {
  position:fixed; inset:0; z-index:20;
  display:flex; flex-direction:column;
  background:var(--bg);
  opacity:0; pointer-events:none; transition:opacity 0.45s;
}
#chat-reveal.active { opacity:1; pointer-events:all; }

/* Shared chat chrome */
.chat-hdr {
  flex-shrink:0; padding:12px 16px 10px;
  background:var(--surface); border-bottom:1px solid var(--border);
  display:flex; align-items:center; gap:12px;
  box-shadow:var(--sh-sm);
}
.ch-back { font-size:22px; color:var(--blue); cursor:pointer; padding:4px; line-height:1; }
.ch-avt { width:38px;height:38px;border-radius:50%;background:linear-gradient(135deg,#FFB347,#FF5C5C);display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;position:relative; }
.ch-online { position:absolute;bottom:0;right:0;width:10px;height:10px;border-radius:50%;background:var(--green);border:2px solid var(--surface); }
.ch-name   { font-size:16px; font-weight:600; }
.ch-status { font-size:12px; color:var(--green); }

.chat-feed {
  flex:1; overflow-y:auto; padding:12px 16px 8px;
  display:flex; flex-direction:column; gap:4px;
  scrollbar-width:none;
}
.chat-feed::-webkit-scrollbar { display:none; }
.date-div { text-align:center; margin:8px 0; }
.date-div span { font-size:11px;color:var(--text-ter);background:var(--border);padding:3px 10px;border-radius:999px; }

.msg { display:flex;gap:8px;max-width:100%;opacity:0;transform:translateY(8px);transition:all 0.35s ease; }
.msg.in { opacity:1; transform:none; }
.msg-sys { align-self:flex-start; align-items:flex-end; margin-bottom:4px; }
.msg-usr { align-self:flex-end; flex-direction:row-reverse; margin-bottom:4px; }
.m-avt { width:28px;height:28px;border-radius:50%;background:linear-gradient(135deg,#FFB347,#FF5C5C);display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0; }
.bubble { padding:10px 14px;font-size:15px;line-height:1.5;max-width:76%;word-break:break-word; }
.msg-sys .bubble { background:var(--surface);color:var(--text-pri);border-radius:18px 18px 18px 4px;box-shadow:var(--sh-sm); }
.msg-usr .bubble { background:var(--blue);color:#fff;border-radius:18px 18px 4px 18px; }
.b-meta { font-size:10px;color:var(--text-ter);margin-top:3px;padding:0 4px; }
.msg-usr .b-meta { text-align:right; }

/* Photo message */
.photo-bubble {
  max-width:76%;
  background:var(--surface); border-radius:16px;
  overflow:hidden; box-shadow:var(--sh-md);
  opacity:0; transform:translateY(8px); transition:all 0.4s ease;
}
.photo-bubble.in { opacity:1; transform:none; }
.photo-bubble img {
  width:100%; display:block; height:auto;
}
.photo-bubble .photo-cap {
  padding:8px 12px; font-size:12px;
  color:var(--text-sec); border-top:1px solid var(--border);
  font-style:italic;
}

.typing-row { display:flex;gap:8px;align-items:flex-end;align-self:flex-start;margin-bottom:4px;opacity:0;transition:opacity 0.3s; }
.typing-row.in { opacity:1; }
.typing-bub { background:var(--surface);border-radius:18px 18px 18px 4px;padding:12px 16px;box-shadow:var(--sh-sm);display:flex;gap:5px;align-items:center; }
.typing-bub span { width:6px;height:6px;border-radius:50%;background:var(--text-ter);animation:td 1.2s infinite; }
.typing-bub span:nth-child(2){animation-delay:0.2s}
.typing-bub span:nth-child(3){animation-delay:0.4s}
@keyframes td { 0%,60%,100%{opacity:0.3;transform:none}30%{opacity:1;transform:translateY(-3px)} }

/* ══════════════════════════════
   DEV SLIDER
══════════════════════════════ */
#dev-wrap {
  position:fixed; bottom:0; left:0; right:0; z-index:99;
  background:rgba(255,255,255,0.97); padding:10px 20px 32px;
  border-top:1px solid var(--border); display:none;
}
#dev-wrap.show { display:block; }
.dev-lbl { font-size:11px;color:var(--text-ter);text-align:center;margin-bottom:6px; }
#dev-slider { -webkit-appearance:none;width:100%;height:4px;background:var(--border);border-radius:999px;outline:none;cursor:pointer; }
#dev-slider::-webkit-slider-thumb { -webkit-appearance:none;width:20px;height:20px;border-radius:50%;background:var(--accent);border:3px solid white;box-shadow:var(--sh-sm); }
</style>
</head>
<body>

<script>
const CONFIG = {
  MIND_FILE:      'targets.mind',
  REVEAL_PHOTO:   'reveal.jpg',
  MARKER_WIDTH_M: 0.12,
  DIST_FAR:    1.8,
  DIST_MID:    1.0,
  DIST_CLOSE:  0.5,
  DIST_REVEAL: 0.20,   /* 20 cm */
  DEV_MODE:    false,
};
</script>

<!-- AR camera layer -->
<div id="ar-container"></div>

<!-- ══ ENTRY ══ -->
<div class="screen active" id="screen-entry">
  <div class="entry-scroll">
    <div class="notif-bar">
      <div class="notif-dot"></div>
      <span class="notif-text">快遞通知</span>
      <span class="notif-time" id="entry-time">--:--</span>
    </div>
    <div class="delivery-card">
      <div class="dc-top">
        <div class="dc-icon">📦</div>
        <div>
          <div class="dc-title">快遞包裹抵達</div>
          <div class="dc-sub">您的包裹已送達指定地點<br>請盡快取件確認</div>
        </div>
      </div>
      <div class="dc-status">
        <div class="dc-sdot"></div>
        <span>等待確認取件 · 需現場掃描</span>
      </div>
      <div class="dc-addr">📍 &nbsp;包裹特徵：貼有草莓圖案</div>
    </div>
    <div class="msg-card" onclick="startAR()">
      <div class="mc-avt">🍓<div class="mc-badge">1</div></div>
      <div class="mc-body">
        <div class="mc-name">陌生來電 · 未知號碼</div>
        <div class="mc-prev">嘿，那個箱子⋯⋯能幫我看一下嗎？</div>
      </div>
      <div class="mc-time">剛剛</div>
    </div>
    <button class="open-btn" onclick="startAR()">開啟鏡頭確認包裹</button>
    <div class="entry-hint">需要相機權限 · 請使用 HTTPS 環境<br>建議 iPhone Safari / Android Chrome</div>
  </div>
</div>

<!-- ══ LOADING ══ -->
<div class="screen" id="screen-loading">
  <div class="spin"></div>
  <div class="spin-label">正在啟動 AR 引擎⋯⋯</div>
</div>

<!-- ══ PRE-SCAN CHAT (before AR) ══ -->
<div id="chat-pre">
  <div class="chat-hdr">
    <div class="ch-avt">🍓<div class="ch-online"></div></div>
    <div>
      <div class="ch-name">陌生來電</div>
      <div class="ch-status" id="pre-status">正在線上</div>
    </div>
  </div>
  <div class="chat-feed" id="pre-feed">
    <div class="date-div"><span>今天</span></div>
    <div class="typing-row" id="pre-typing">
      <div class="m-avt">🍓</div>
      <div class="typing-bub"><span></span><span></span><span></span></div>
    </div>
  </div>
  <!-- no options dock here; options appear in AR overlay -->
</div>

<!-- ══ AR UX OVERLAY (over full-screen camera) ══ -->
<div id="ar-ux">
  <!-- top area: scan frame / AR messages / distance pill -->
  <div class="ar-top">
    <!-- AR message stream (visible from start) -->
    <div class="ar-msg-stream" id="ar-msgs"></div>

    <!-- distance pill top-right -->
    <div class="dist-pill" id="dist-pill">
      <div class="dp-dot" id="dp-dot"></div>
      <div class="dp-val" id="dp-val">-- m</div>
    </div>
  </div>

  <!-- bottom dock: fruit options -->
  <div class="ar-bottom" id="ar-bottom">
    <div class="dock-label">選一個最接近的標籤</div>
    <div class="fruit-grid" id="fruit-grid">
      <div class="f-btn" data-label="喜悅草莓" onclick="pickFruit(this)"><div class="f-emoji">🍓</div><div class="f-label">喜悅</div></div>
      <div class="f-btn" data-label="悲傷檸檬" onclick="pickFruit(this)"><div class="f-emoji">🍋</div><div class="f-label">悲傷</div></div>
      <div class="f-btn" data-label="憤怒葡萄" onclick="pickFruit(this)"><div class="f-emoji">🍇</div><div class="f-label">憤怒</div></div>
      <div class="f-btn" data-label="焦慮橘子" onclick="pickFruit(this)"><div class="f-emoji">🍊</div><div class="f-label">焦慮</div></div>
      <div class="f-btn" data-label="孤獨藍莓" onclick="pickFruit(this)"><div class="f-emoji">🫐</div><div class="f-label">孤獨</div></div>
      <div class="f-btn" data-label="平靜蜜瓜" onclick="pickFruit(this)"><div class="f-emoji">🍈</div><div class="f-label">平靜</div></div>
    </div>
  </div>
</div>

<!-- ══ POST-AR REVEAL CHAT ══ -->
<div id="chat-reveal">
  <div class="chat-hdr">
    <div class="ch-avt">🍓<div class="ch-online"></div></div>
    <div>
      <div class="ch-name">陌生來電</div>
      <div class="ch-status" id="reveal-status">正在線上</div>
    </div>
  </div>
  <div class="chat-feed" id="reveal-feed">
    <div class="date-div"><span>今天</span></div>
    <div class="typing-row" id="reveal-typing">
      <div class="m-avt">🍓</div>
      <div class="typing-bub"><span></span><span></span><span></span></div>
    </div>
  </div>
</div>

<!-- ══ DEV SLIDER ══ -->
<div id="dev-wrap">
  <div class="dev-lbl">[ DEV ] 模擬距離（部署前移除）</div>
  <input type="range" id="dev-slider" min="0" max="200" value="200" oninput="devSim(this.value)">
</div>

<!-- ══ MAIN SCRIPT ══ -->
<script>
/* ─── STATE ──────────────────────────── */
const S = {
  phase: 'entry',          /* entry | loading | pre-chat | ar | reveal */
  fruitsChosen: 0,
  selectedLabels: [],
  approachStartTime: 0,
  approachDuration: 0,
  hesitationCount: 0,
  lastDist: 999,
  lastDistTime: 0,
  estimatedDist: 999,
  markerVisible: false,
  mindar: null,
};

/* ─── CONTENT ────────────────────────── */
/* Pre-AR chat (before camera opens) */
const PRE_CHAT = [
  { text: '嘿，不好意思，你是外送員嗎？' },
  { text: '我剛收到取件通知說包裹到了，但我現在被困在外面⋯⋯' },
  { text: '那個箱子上有貼草莓嗎？\n能幫我確認一下包裹的狀態嗎？' },
  { text: '開鏡頭對準那個箱子，選一個最接近的標籤就好。', action: 'open-ar' },
];

/* Replies to fruit picks */
const REPLIES = {
  '喜悅草莓': ['你真的覺得是這樣嗎？', '也許是喜悅。但我不確定那是全部。'],
  '悲傷檸檬': ['嗯。你是這樣看的。', '有時候悲傷跟別的東西長得很像。'],
  '憤怒葡萄': ['憤怒⋯⋯可能吧。', '或者是別的什麼，被誤認為憤怒。'],
  '焦慮橘子': ['你感覺到焦慮了嗎？', '或許只是⋯⋯不確定。'],
  '孤獨藍莓': ['孤獨。', '有時候孤獨跟存在感很近。'],
  '平靜蜜瓜': ['平靜⋯⋯真的嗎？', '有些平靜是真的，有些只是沉默。'],
};

/* Proximity messages (float over AR, triggered by distance) */
const PROX_MSG = [
  { dist: 1.4, text: '能看到箱子嗎？告訴我它現在的狀態。' },
  { dist: 0.9, text: '再靠近一點⋯⋯' },
  { dist: 0.55, text: '就快了。繼續靠近。' },
  { dist: 0.3, text: '⋯⋯' },
];

/* Reveal chat (after crossing 10cm) */
const REVEAL_CHAT_FAST = [
  { text: '⋯⋯' },
  { text: '你靠得很快。', delay: 1200 },
  { text: '你急著想看到答案？', delay: 1000 },
  { photo: true, delay: 1800 },
  { text: '這是從裡面拍的。', delay: 600 },
  { text: '我一直都在這裡。\n只是不在你的選項裡。', delay: 1400 },
];
const REVEAL_CHAT_HES = [
  { text: '⋯⋯你來了又退。' },
  { text: '我知道。\n要靠近一個不知道是什麼的東西，很難。', delay: 1400 },
  { photo: true, delay: 2000 },
  { text: '這是從裡面拍的。', delay: 600 },
  { text: '我不是那些標籤裡的任何一個。\n但我一直在這裡。', delay: 1600 },
];
const REVEAL_CHAT_SLOW = [
  { text: '你很慢。' },
  { text: '但你還是來了。', delay: 1000 },
  { photo: true, delay: 2000 },
  { text: '這是從裡面拍的。', delay: 600 },
  { text: '當你的選項全部消失的時候，\n才剩下真實的我。', delay: 1600 },
];

/* ─── HELPERS ────────────────────────── */
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id)?.classList.add('active');
}
function ts() {
  const n = new Date();
  return `${n.getHours().toString().padStart(2,'0')}:${n.getMinutes().toString().padStart(2,'0')}`;
}
function wait(ms) { return new Promise(r => setTimeout(r, ms)); }

/* Clock */
setInterval(() => {
  const el = document.getElementById('entry-time');
  if (el) el.textContent = ts();
}, 1000);

/* ─── PRE-CHAT ───────────────────────── */
function addPreMsg(text) {
  const feed  = document.getElementById('pre-feed');
  const tdots = document.getElementById('pre-typing');
  const div = document.createElement('div');
  div.className = 'msg msg-sys';
  div.innerHTML = `<div class="m-avt">🍓</div>
    <div><div class="bubble">${text.replace(/\n/g,'<br>')}</div>
    <div class="b-meta">${ts()}</div></div>`;
  feed.insertBefore(div, tdots);
  requestAnimationFrame(() => requestAnimationFrame(() => div.classList.add('in')));
  setTimeout(() => { feed.scrollTop = feed.scrollHeight; }, 80);
}
function showPreTyping()  { document.getElementById('pre-typing').classList.add('in'); }
function hidePreTyping()  { document.getElementById('pre-typing').classList.remove('in'); }

async function runPreChat() {
  for (const step of PRE_CHAT) {
    showPreTyping();
    await wait(900 + step.text.replace(/\n/g,'').length * 30 + Math.random()*300);
    hidePreTyping();
    addPreMsg(step.text);
    if (step.action === 'open-ar') {
      await wait(1200);
      openARPhase();
      return;
    }
    await wait(700 + Math.random()*400);
  }
}

/* ─── START AR ───────────────────────── */
async function startAR() {
  showScreen('screen-loading');
  S.phase = 'loading';

  try {
    await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } });
  } catch {
    alert('需要相機權限才能繼續。');
    showScreen('screen-entry'); return;
  }

  await new Promise(r => {
    if (window._mindARReady) return r();
    window.addEventListener('mindar-ready', r, { once: true });
  });

  S.mindar = new window.MindARThree({
    container: document.getElementById('ar-container'),
    imageTargetSrc: CONFIG.MIND_FILE,
    maxTrack: 1,
    uiLoading: 'no', uiScanning: 'no', uiError: 'no',
    cameraDeviceId: await rearCam(),
  });

  const { renderer, scene, camera } = S.mindar;
  /* Three.js r152+ uses outputColorSpace */
  renderer.outputColorSpace = window.THREE.SRGBColorSpace ?? 'srgb';

  const anchor = S.mindar.addAnchor(0);
  anchor.onTargetFound = () => {
    S.markerVisible = true;
    if (S.phase === 'ar') onTargetFound();
  };
  anchor.onTargetLost = () => {
    S.markerVisible = false;
  };

  document.getElementById('ar-container').classList.add('active');
  try { await S.mindar.start(); } catch(e) { console.warn(e); }

  if (CONFIG.DEV_MODE) document.getElementById('dev-wrap').classList.add('show');

  renderer.setAnimationLoop(() => {
    renderer.render(scene, camera);
    if (S.markerVisible && S.phase === 'ar') estimateDist(anchor);
  });

  /* Show pre-chat first */
  S.phase = 'pre-chat';
  showScreen('screen-loading'); /* hide loading */
  document.getElementById('screen-loading').classList.remove('active');
  document.getElementById('chat-pre').classList.add('active');
  runPreChat();
}

/* ─── OPEN AR PHASE ─────────────────── */
function openARPhase() {
  S.phase = 'ar';
  document.getElementById('chat-pre').classList.remove('active');
  document.getElementById('ar-container').classList.add('active');
  document.getElementById('ar-ux').classList.add('active');
  document.getElementById('dist-pill').classList.add('visible');
}

/* ─── TARGET FOUND ──────────────────── */
let targetFoundOnce = false;
function onTargetFound() {
  if (targetFoundOnce) return;
  targetFoundOnce = true;
  /* First message when box is detected */
  addARMsg('找到了⋯⋯就是這個箱子。');
}

/* ─── AR MESSAGES (float over camera, max 2 shown) ── */
let proxMsgIdx = 0;
function maybeShowProxMsg(dist) {
  if (proxMsgIdx >= PROX_MSG.length) return;
  const next = PROX_MSG[proxMsgIdx];
  if (dist <= next.dist) {
    addARMsg(next.text);
    proxMsgIdx++;
  }
}
function addARMsg(text) {
  const stream = document.getElementById('ar-msgs');
  const row = document.createElement('div');
  row.className = 'ar-bubble-row';
  row.innerHTML = `<div class="ar-avt">🍓</div><div class="ar-bubble">${text}</div>`;
  stream.appendChild(row);
  requestAnimationFrame(() => requestAnimationFrame(() => row.classList.add('in')));
  /* Keep only 2 rows visible — fade and remove the oldest */
  const all = stream.querySelectorAll('.ar-bubble-row');
  if (all.length > 2) {
    const old = all[0];
    old.style.transition = 'opacity 0.4s';
    old.style.opacity = '0';
    setTimeout(() => old.remove(), 420);
  }
}

/* ─── FRUIT PICK ─────────────────────── */
/* Track which labels have already received a reply this session */
const repliedLabels = new Set();

function pickFruit(el) {
  if (!el || el.classList.contains('decay-gone') || el.classList.contains('decay-3')) return;
  const label = el.dataset.label;
  if (!label) return;

  /* Prevent duplicate reply for same label */
  if (repliedLabels.has(label)) return;
  repliedLabels.add(label);

  S.selectedLabels.push(label);
  S.fruitsChosen++;
  el.classList.add('selected');

  /* Show reply as AR bubble */
  const rs = REPLIES[label] || ['⋯⋯'];
  const reply = rs[Math.floor(Math.random() * rs.length)];
  setTimeout(() => {
    addARMsg(reply);
    /* After 3 picks, prompt to approach */
    if (S.fruitsChosen === 3) {
      setTimeout(() => addARMsg('好了⋯⋯靠近一點，再靠近一點。'), 1400);
    }
  }, 400);
}

/* ─── DISTANCE ───────────────────────── */
async function rearCam() {
  try {
    const d = await navigator.mediaDevices.enumerateDevices();
    const c = d.filter(x => x.kind === 'videoinput');
    if (c.length <= 1) return undefined;
    const r = c.find(x => /back|rear|environment/i.test(x.label));
    return r ? r.deviceId : c[c.length - 1].deviceId;
  } catch { return undefined; }
}

function estimateDist(anchor) {
  if (!anchor.group || !window.THREE) return;
  const cam = S.mindar.camera;
  const l = new window.THREE.Vector3(-0.5, 0, 0);
  const r = new window.THREE.Vector3( 0.5, 0, 0);
  l.applyMatrix4(anchor.group.matrixWorld);
  r.applyMatrix4(anchor.group.matrixWorld);
  l.project(cam); r.project(cam);
  const cW = S.mindar.renderer.domElement.clientWidth;
  const px = Math.abs(r.x - l.x) * cW / 2;
  if (px < 5) return;
  const fov = (cam.fov * Math.PI) / 180;
  const fc = (cW / 2) / Math.tan(fov / 2);
  const dist = (CONFIG.MARKER_WIDTH_M * fc) / px;
  processDist(S.estimatedDist * 0.75 + dist * 0.25);
}

function processDist(dist) {
  const now = Date.now();
  const delta = S.lastDist - dist;

  if (delta > 0.02 && dist < CONFIG.DIST_FAR) {
    if (!S.approachStartTime) S.approachStartTime = now;
    S.approachDuration += now - (S.lastDistTime || now);
  }
  if (delta < -0.06 && dist < CONFIG.DIST_MID) S.hesitationCount++;

  S.lastDist = dist; S.lastDistTime = now; S.estimatedDist = dist;

  updateDistUI(dist);
  maybeShowProxMsg(dist);
  updateFruitDecay(dist);

  /* Only trigger reveal after at least 3 fruit picks */
  if (dist <= CONFIG.DIST_REVEAL && S.phase === 'ar') {
    if (S.fruitsChosen >= 3) {
      triggerReveal();
    } else {
      /* Not enough picks yet — nudge the user */
      const remaining = 3 - S.fruitsChosen;
      if (!window._nudgeSent) {
        window._nudgeSent = true;
        addARMsg(remaining === 2
          ? '先選幾個標籤⋯⋯再靠近。'
          : '再多選一個⋯⋯'
        );
        setTimeout(() => { window._nudgeSent = false; }, 3000);
      }
    }
  }
}

function devSim(v) {
  const dist = v / 100;
  if (S.phase === 'pre-chat') {
    openARPhase();
    S.markerVisible = true;
  }
  if (S.phase === 'ar') {
    S.markerVisible = true;
    if (!targetFoundOnce) onTargetFound();
    processDist(dist);
  }
}

/* ─── DISTANCE UI ────────────────────── */
function updateDistUI(dist) {
  document.getElementById('dp-val').textContent = dist.toFixed(2) + ' m';
  const prox = Math.max(0, Math.min(1, 1 - (dist - CONFIG.DIST_REVEAL) / (CONFIG.DIST_FAR - CONFIG.DIST_REVEAL)));
  document.getElementById('dp-dot').style.boxShadow =
    `0 0 ${6 + prox * 14}px rgba(255,92,92,${0.6 + prox * 0.4})`;
}

/* ─── FRUIT DECAY ────────────────────── */
/* Track which buttons have already been removed */
const goneButtons = new Set();

function updateFruitDecay(dist) {
  /* decay: 0 at DIST_MID, 1 at DIST_REVEAL */
  const decay = Math.max(0, Math.min(1,
    (CONFIG.DIST_MID - dist) / (CONFIG.DIST_MID - CONFIG.DIST_REVEAL)
  ));

  const btns = Array.from(document.querySelectorAll('.f-btn'));
  const total = btns.length;
  /* Always keep at least 1 button visible */
  const maxGone = total - 1;
  /* How many should be gone at this decay level */
  const targetGone = Math.min(maxGone, Math.floor(decay * total));

  btns.forEach((btn, i) => {
    if (goneButtons.has(i)) return; /* already removed */

    /* Each button starts decaying offset by its position */
    const btnStart = i / total * 0.6; /* stagger start */
    const btnDecay = Math.max(0, (decay - btnStart) / (1 - btnStart));

    /* Remove class flickering by only adding, never removing decay classes */
    btn.classList.remove('decay-1','decay-2','decay-3');
    if (btnDecay <= 0)        { /* visible, no class */ }
    else if (btnDecay < 0.35) btn.classList.add('decay-1');
    else if (btnDecay < 0.65) btn.classList.add('decay-2');
    else if (btnDecay < 0.85) btn.classList.add('decay-3');
    else if (i < targetGone && !goneButtons.has(i)) {
      /* Mark as gone — permanent */
      goneButtons.add(i);
      btn.classList.remove('decay-1','decay-2','decay-3');
      btn.classList.add('decay-gone');
    }
  });
}

/* ─── REVEAL ─────────────────────────── */
let revealDone = false;
async function triggerReveal() {
  if (revealDone) return;
  revealDone = true;
  S.phase = 'reveal';

  /* Stop AR */
  if (S.mindar) { try { S.mindar.pause(); } catch {} }
  document.getElementById('ar-container').classList.remove('active');
  document.getElementById('ar-ux').classList.remove('active');
  document.getElementById('dev-wrap').classList.remove('show');

  /* Pick reveal script based on behaviour */
  const fast = S.approachDuration < 7000 && S.hesitationCount === 0;
  const hes  = S.hesitationCount >= 2;
  const script = fast ? REVEAL_CHAT_FAST : hes ? REVEAL_CHAT_HES : REVEAL_CHAT_SLOW;

  /* Show reveal chat */
  document.getElementById('chat-reveal').classList.add('active');

  /* Run script */
  for (const step of script) {
    await wait(step.delay ?? 600);
    if (step.photo) {
      showRevealPhoto();
    } else {
      showRevealTyping();
      await wait(800 + step.text.length * 25);
      hideRevealTyping();
      addRevealMsg(step.text);
    }
  }
}

function addRevealMsg(text) {
  const feed  = document.getElementById('reveal-feed');
  const tdots = document.getElementById('reveal-typing');
  const div = document.createElement('div');
  div.className = 'msg msg-sys';
  div.innerHTML = `<div class="m-avt">🍓</div>
    <div><div class="bubble">${text.replace(/\n/g,'<br>')}</div>
    <div class="b-meta">${ts()}</div></div>`;
  feed.insertBefore(div, tdots);
  requestAnimationFrame(() => requestAnimationFrame(() => div.classList.add('in')));
  setTimeout(() => { feed.scrollTop = feed.scrollHeight; }, 80);
}

function showRevealPhoto() {
  const feed  = document.getElementById('reveal-feed');
  const tdots = document.getElementById('reveal-typing');
  const wrap = document.createElement('div');
  wrap.className = 'msg msg-sys';

  const photo = document.createElement('div');
  photo.className = 'photo-bubble';

  if (CONFIG.REVEAL_PHOTO) {
    const img = document.createElement('img');
    img.alt = '箱內視角';
    img.style.cssText = 'width:100%;display:block;height:auto;filter:saturate(0.4) brightness(0.65) blur(1px);';
    /* Build absolute URL relative to current page to avoid path issues */
    const base = window.location.href.replace(/\/[^/]*$/, '/');
    img.src = base + CONFIG.REVEAL_PHOTO;
    photo.appendChild(img);
    const cap = document.createElement('div');
    cap.className = 'photo-cap';
    cap.textContent = '從箱子裡面拍的⋯⋯';
    photo.appendChild(cap);
    wrap.appendChild(photo);
    feed.insertBefore(wrap, tdots);
    requestAnimationFrame(() => requestAnimationFrame(() => photo.classList.add('in')));
  } else {
    /* Fallback: generated */
    const gen = document.createElement('div');
    gen.style.cssText = 'width:100%;aspect-ratio:1;background:#1a1a1a;display:flex;align-items:center;justify-content:center;font-size:80px;filter:blur(2px) brightness(0.5)';
    gen.textContent = '🍓';
    photo.appendChild(gen);
    const cap = document.createElement('div');
    cap.className = 'photo-cap';
    cap.textContent = '從箱子裡面拍的⋯⋯';
    photo.appendChild(cap);
    wrap.appendChild(photo);
    feed.insertBefore(wrap, tdots);
    requestAnimationFrame(() => requestAnimationFrame(() => photo.classList.add('in')));
  }

  setTimeout(() => { feed.scrollTop = feed.scrollHeight; }, 80);
}

function showRevealTyping()  { document.getElementById('reveal-typing').classList.add('in'); }
function hideRevealTyping()  { document.getElementById('reveal-typing').classList.remove('in'); }
</script>
</body>
